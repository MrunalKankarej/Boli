<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Together</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ─── RESET & BASE ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{
  font-family:'Nunito',sans-serif;
  background:#0d0d0d;
  touch-action:manipulation;
}

/* ─── APP SHELL ─── */
.app-shell{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  overflow:hidden;
  background:#FDF6EC;
}

/* ─── SCREEN TRANSITIONS ─── */
.screen-wrap{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  transition:opacity .4s cubic-bezier(.4,0,.2,1),transform .4s cubic-bezier(.4,0,.2,1);
  will-change:transform,opacity;
}
.screen-wrap.entering{opacity:0;transform:translateX(60px)}
.screen-wrap.visible{opacity:1;transform:translateX(0)}
.screen-wrap.exiting{opacity:0;transform:translateX(-60px);pointer-events:none}

/* ─── TOP NAV BAR ─── */
.top-bar{
  position:relative;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;
  background:transparent;
  flex-shrink:0;
}
.nav-back{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.95);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.14);
  transition:transform .15s,box-shadow .15s;
  flex-shrink:0;
}
.nav-back:active{transform:scale(.9)}
.nav-back svg{display:block}
.progress-bar-wrap{
  flex:1;margin:0 12px;
  height:8px;border-radius:99px;
  background:rgba(0,0,0,.08);
  overflow:hidden;
}
.progress-bar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,#FF8A3D,#FFD04E);
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.nav-lang{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.95);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.14);
  font-size:20px;
}

/* ─── SCROLL AREA ─── */
.scroll-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 18px 32px;
}
.scroll-area::-webkit-scrollbar{display:none}

/* ══════════════════════════════════
   SCREEN 1 — START
══════════════════════════════════ */
.start-screen{
  position:relative;
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
  background:linear-gradient(155deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);
  padding:40px 24px;
  gap:0;
}
.start-orbs{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35;animation:orb-drift 8s ease-in-out infinite}
.orb1{width:300px;height:300px;background:#FF8A3D;top:-80px;right:-60px;animation-delay:0s}
.orb2{width:250px;height:250px;background:#9B5DE5;bottom:20px;left:-80px;animation-delay:-3s}
.orb3{width:200px;height:200px;background:#00BBF9;bottom:100px;right:20px;animation-delay:-5s}
@keyframes orb-drift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(20px,-30px) scale(1.1)}
  66%{transform:translate(-15px,20px) scale(.95)}
}

.start-logo-ring{
  position:relative;
  width:180px;height:180px;
  margin-bottom:44px;
}
.start-logo-ring::before{
  content:'';position:absolute;inset:-12px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,.15);
  animation:ring-spin 12s linear infinite;
}
.start-logo-ring::after{
  content:'';position:absolute;inset:-24px;
  border-radius:50%;
  border:2px dashed rgba(255,255,255,.08);
  animation:ring-spin 20s linear infinite reverse;
}
@keyframes ring-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.start-logo-inner{
  width:100%;height:100%;border-radius:50%;
  background:linear-gradient(135deg,#FF8A3D,#FFD04E);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 20px 60px rgba(255,138,61,.4),0 0 0 1px rgba(255,255,255,.1);
  font-family:'Baloo 2',cursive;
  font-size:72px;font-weight:800;color:white;
  text-shadow:0 4px 16px rgba(0,0,0,.3);
  animation:logo-float 4s ease-in-out infinite;
}
@keyframes logo-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.start-tagline{
  font-family:'Baloo 2',cursive;
  font-size:28px;font-weight:700;
  color:white;text-align:center;
  line-height:1.2;margin-bottom:8px;
  text-shadow:0 2px 12px rgba(0,0,0,.3);
}
.start-sub{
  font-size:14px;color:rgba(255,255,255,.55);
  text-align:center;margin-bottom:52px;
  letter-spacing:2px;text-transform:uppercase;font-weight:600;
}
.play-btn{
  width:96px;height:96px;border-radius:50%;
  background:white;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 16px 48px rgba(0,0,0,.3),0 0 0 0 rgba(255,255,255,.3);
  animation:play-pulse 2.5s ease-out infinite;
  transition:transform .15s;
}
.play-btn:active{transform:scale(.93)}
@keyframes play-pulse{
  0%{box-shadow:0 16px 48px rgba(0,0,0,.3),0 0 0 0 rgba(255,255,255,.4)}
  60%{box-shadow:0 16px 48px rgba(0,0,0,.3),0 0 0 28px rgba(255,255,255,0)}
  100%{box-shadow:0 16px 48px rgba(0,0,0,.3),0 0 0 0 rgba(255,255,255,0)}
}
.play-btn svg{margin-left:6px}

.start-lang-pills{
  display:flex;gap:10px;margin-top:32px;flex-wrap:wrap;justify-content:center;
}
.lang-pill{
  padding:8px 18px;border-radius:99px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.75);
  font-size:13px;font-weight:700;
  cursor:pointer;transition:background .2s,border-color .2s;
}
.lang-pill.active{background:rgba(255,138,61,.35);border-color:#FF8A3D;color:white}
.lang-pill:active{transform:scale(.95)}

/* ══════════════════════════════════
   SCREEN HEADER
══════════════════════════════════ */
.screen-header{
  text-align:center;padding:8px 0 24px;
}
.screen-eyebrow{
  font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  color:#aaa;margin-bottom:6px;
}
.screen-icon{font-size:44px;line-height:1;display:block;margin-bottom:6px}

/* ══════════════════════════════════
   PHOTO CARD — reusable
══════════════════════════════════ */
.photo-card{
  position:relative;overflow:hidden;
  border-radius:24px;cursor:pointer;
  border:3px solid transparent;
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  transition:transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s,border-color .2s;
  background:#eee;
}
.photo-card:active{transform:scale(.97);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.photo-card img{
  width:100%;display:block;object-fit:cover;
  pointer-events:none;user-select:none;
}
.photo-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,rgba(0,0,0,.1) 55%,transparent 100%);
}
.photo-card-content{
  position:absolute;bottom:0;left:0;right:0;
  padding:16px 18px 18px;
}
.photo-card-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:99px;
  font-size:12px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;
}
.photo-card-title{
  font-family:'Baloo 2',cursive;
  font-size:22px;font-weight:700;color:white;
  line-height:1.1;text-shadow:0 2px 8px rgba(0,0,0,.4);
}
.photo-card-check{
  position:absolute;top:14px;right:14px;
  width:36px;height:36px;border-radius:50%;
  background:white;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
  font-size:18px;
}

/* ══════════════════════════════════
   SCREEN 2 — CATEGORY
══════════════════════════════════ */
.cat-list{display:flex;flex-direction:column;gap:14px}
.cat-card{height:160px}
.cat-card img{height:160px}

/* ══════════════════════════════════
   SCREEN 3 — MODULE TYPE
══════════════════════════════════ */
.mod-grid{display:flex;flex-direction:column;gap:16px}
.mod-card{height:190px}
.mod-card img{height:190px}

/* ══════════════════════════════════
   SCREEN 4 — SCENARIO
══════════════════════════════════ */
.scenario-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;
}
.sc-card{height:155px}
.sc-card img{height:155px}
.sc-card .photo-card-title{font-size:16px}
.sc-card .photo-card-content{padding:12px 14px 14px}

/* ══════════════════════════════════
   SCREEN 5 — LEARNING
══════════════════════════════════ */
.learn-screen{
  flex:1;display:flex;flex-direction:column;
  background:#0d0d0d;overflow:hidden;
}
.learn-hero{
  position:relative;flex:0 0 52vw;max-height:300px;overflow:hidden;
}
.learn-hero img{
  width:100%;height:100%;object-fit:cover;
  display:block;
}
.learn-hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(0deg,#0d0d0d 0%,transparent 60%);
}
.learn-scene-tag{
  position:absolute;top:16px;right:16px;
  padding:6px 14px;border-radius:99px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  color:white;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
}
.learn-body{
  flex:1;display:flex;flex-direction:column;
  padding:0 20px 28px;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.learn-body::-webkit-scrollbar{display:none}

/* lesson progress strip */
.lesson-dots{
  display:flex;gap:6px;justify-content:center;
  padding:16px 0 20px;
}
.lesson-dot{
  height:6px;border-radius:99px;
  background:rgba(255,255,255,.2);
  transition:width .3s,background .3s;
  width:24px;
}
.lesson-dot.active{background:#FF8A3D;width:36px}
.lesson-dot.done{background:#06D6A0;width:24px}

/* word display */
.learn-word-wrap{
  text-align:center;margin-bottom:12px;
}
.learn-word{
  font-family:'Baloo 2',cursive;
  font-size:42px;font-weight:800;color:white;
  line-height:1;letter-spacing:1px;
}
.learn-phrase{
  font-size:16px;color:rgba(255,255,255,.6);
  font-weight:600;line-height:1.5;
  margin-top:6px;
}

/* answer chips */
.chips-label{
  font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(255,255,255,.35);text-align:center;margin-bottom:12px;
}
.chips-wrap{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  margin-bottom:20px;
}
.chip{
  padding:11px 22px;border-radius:99px;
  font-size:16px;font-weight:800;color:white;
  background:rgba(255,255,255,.1);
  border:2px solid rgba(255,255,255,.18);
  cursor:pointer;
  transition:transform .15s,background .15s,border-color .15s,box-shadow .15s;
}
.chip:active{transform:scale(.95)}
.chip.correct{background:rgba(6,214,160,.3);border-color:#06D6A0;box-shadow:0 0 20px rgba(6,214,160,.3)}
.chip.wrong{background:rgba(239,71,111,.3);border-color:#EF476F;box-shadow:0 0 20px rgba(239,71,111,.3)}
.chip.reveal{background:rgba(6,214,160,.2);border-color:rgba(6,214,160,.5)}
.chip.disabled{pointer-events:none}

/* action row */
.action-row{
  display:flex;align-items:center;justify-content:center;gap:16px;
  margin-top:auto;padding-top:16px;
}
.act-btn{
  border:none;cursor:pointer;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s;
  flex-shrink:0;
}
.act-btn:active{transform:scale(.9)}
.act-btn.speaker{
  width:68px;height:68px;background:#FFD04E;
  box-shadow:0 8px 24px rgba(255,208,78,.4);font-size:28px;
}
.act-btn.speaker.playing{animation:btn-bounce .35s ease infinite alternate}
.act-btn.mic{
  width:84px;height:84px;background:#EF476F;
  box-shadow:0 8px 32px rgba(239,71,111,.45);font-size:34px;
}
.act-btn.mic.recording{animation:mic-ring .7s ease infinite}
.act-btn.nxt{
  width:68px;height:68px;background:#06D6A0;
  box-shadow:0 8px 24px rgba(6,214,160,.4);font-size:28px;
}
@keyframes btn-bounce{from{transform:scale(1)}to{transform:scale(1.12)}}
@keyframes mic-ring{
  0%{box-shadow:0 0 0 0 rgba(239,71,111,.6)}
  70%{box-shadow:0 0 0 22px rgba(239,71,111,0)}
  100%{box-shadow:0 0 0 0 rgba(239,71,111,0)}
}

/* ─── TOAST ─── */
.toast{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.7);
  background:white;border-radius:24px;
  padding:20px 40px;font-size:52px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  z-index:9999;opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;
}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* ─── COMPLETION ─── */
.complete-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(145deg,#0a0e1a,#112240);
  padding:40px 28px;text-align:center;gap:20px;
}
.complete-ring{
  width:140px;height:140px;border-radius:50%;
  background:linear-gradient(135deg,#06D6A0,#118AB2);
  display:flex;align-items:center;justify-content:center;
  font-size:64px;
  box-shadow:0 0 60px rgba(6,214,160,.4);
  animation:logo-float 3s ease-in-out infinite;
}
.complete-title{
  font-family:'Baloo 2',cursive;
  font-size:32px;font-weight:800;color:white;
}
.complete-sub{font-size:15px;color:rgba(255,255,255,.55);font-weight:600}
.complete-stars{font-size:36px;letter-spacing:4px}
.complete-btn{
  margin-top:12px;padding:18px 44px;border-radius:99px;
  background:linear-gradient(135deg,#FF8A3D,#FFD04E);
  border:none;cursor:pointer;
  font-family:'Baloo 2',cursive;font-size:20px;font-weight:700;color:white;
  box-shadow:0 12px 32px rgba(255,138,61,.4);
  transition:transform .15s;
}
.complete-btn:active{transform:scale(.97)}

/* ─── IMG LOADING SHIMMER ─── */
.img-shimmer{
  background:linear-gradient(90deg,#e8e8e8 25%,#f5f5f5 50%,#e8e8e8 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
</style>
</head>
<body>
<div id="root"></div>

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

  try{
    const ac=getAudioCtx();
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    osc.connect(gain);gain.connect(ac.destination);
    osc.type=type;osc.frequency.setValueAtTime(freq,ac.currentTime);
    gain.gain.setValueAtTime(0.18,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    osc.start();osc.stop(ac.currentTime+dur);
  }catch(e){}
}
function playChime(notes){notes.forEach(([f,d,t=0])=>setTimeout(()=>playTone(f,d),t))}
const SFX={
  tap:()=>playChime([[880,.08]]),
  nav:()=>playChime([[523,.1,0],[659,.1,80],[784,.15,160]]),
  correct:()=>playChime([[523,.1,0],[659,.1,100],[784,.1,200],[1047,.25,300]]),
  wrong:()=>playChime([[330,.2,0],[294,.25,120]]),
  complete:()=>playChime([[523,.1,0],[659,.1,80],[784,.1,160],[1047,.12,240],[1319,.3,340]]),
};

// ─────────────────────────────────────
//  SPEAK (TTS)
// ─────────────────────────────────────
function speak(text,onEnd){
  if(!('speechSynthesis' in window)){onEnd&&onEnd();return}
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.rate=0.82;utt.pitch=1.05;
  utt.onend=()=>onEnd&&onEnd();
  window.speechSynthesis.speak(utt);
}

// ─────────────────────────────────────
//  SCREEN 5 — LEARNING
// ─────────────────────────────────────
function LearningScreen({scenario,onBack,onComplete}){
  const [lessonIdx,setLessonIdx]=useState(0);
  const [chips,setChips]=useState([]);
  const [answered,setAnswered]=useState(null); // null | 'correct' | 'wrong'
  const [speaking,setSpeaking]=useState(false);
  const [recording,setRecording]=useState(false);
  const [toast,setToast]=useState({show:false,msg:''});
  const [done,setDone]=useState(false);
  const recTimer=useRef(null);

  const lesson=scenario.lessons[lessonIdx];
  const total=scenario.lessons.length;

  // init chips on lesson change
  useEffect(()=>{
    const shuffled=[...lesson.choices].sort(()=>Math.random()-.5);
    setChips(shuffled.map(w=>({word:w,state:'idle'})));
    setAnswered(null);
  },[lessonIdx]);

  function showToast(msg){
    setToast({show:true,msg});
    setTimeout(()=>setToast({show:false,msg:''}),900);
  }

  function handleChip(idx){
    if(answered) return;
    const chip=chips[idx];
    const correct=chip.word===lesson.word;
    const next=chips.map((c,i)=>{
      if(i===idx) return{...c,state:correct?'correct':'wrong'};
      if(!correct&&c.word===lesson.word) return{...c,state:'reveal'};
      return{...c,state:'disabled'};
    });
    setChips(next);
    setAnswered(correct?'correct':'wrong');
    if(correct){SFX.correct();showToast('✅')}
    else{SFX.wrong();showToast('❌')}
  }

  function handleSpeak(){
    if(speaking) return;
    setSpeaking(true);
    SFX.tap();
    speak(lesson.phrase,()=>setSpeaking(false));
  }

  function handleMic(){
    if(recording){
      clearTimeout(recTimer.current);
      setRecording(false);
      showToast('👏');
      SFX.correct();
    } else {
      setRecording(true);
      SFX.tap();
      recTimer.current=setTimeout(()=>{setRecording(false);showToast('👍');},3000);
    }
  }

  function handleNext(){
    SFX.nav();
    if(lessonIdx+1>=total){setDone(true);SFX.complete();}
    else setLessonIdx(l=>l+1);
  }

  if(done){
    return(
      <div className="screen-wrap visible">
        <div className="complete-screen">
          <div className="complete-ring">🎉</div>
          <div className="complete-title">Well Done!</div>
          <div className="complete-stars">{'⭐'.repeat(Math.min(3,total))}</div>
          <div className="complete-sub">{scenario.title} • {total} lessons</div>
          <button className="complete-btn" onClick={()=>{SFX.nav();onComplete()}}>
            🗺️ More
          </button>
        </div>
      </div>
    );
  }

  return(
    <div className="screen-wrap visible">
      <Toast msg={toast.msg} show={toast.show}/>
      <div className="learn-screen">
        {/* Hero image */}
        <div className="learn-hero">
          <img src={scenario.img} alt={scenario.title}/>
          <div className="learn-hero-overlay"/>
          <div className="learn-scene-tag">{scenario.emoji} {scenario.title}</div>
          {/* back btn */}
          <button className="nav-back" onClick={()=>{SFX.tap();onBack()}}
            style={{position:'absolute',top:14,left:14}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
        </div>

        <div className="learn-body">
          {/* lesson progress dots */}
          <div className="lesson-dots">
            {scenario.lessons.map((_,i)=>(
              <div key={i} className={`lesson-dot ${i<lessonIdx?'done':i===lessonIdx?'active':''}`}/>
            ))}
          </div>

          {/* word */}
          <div className="learn-word-wrap">
            <div className="learn-word">{lesson.word}</div>
            <div className="learn-phrase">{lesson.phrase}</div>
          </div>

          {/* chips */}
          <div className="chips-label">TAP THE WORD</div>
          <div className="chips-wrap">
            {chips.map((c,i)=>(
              <div key={c.word} className={`chip ${c.state}`}
                onClick={()=>handleChip(i)}>{c.word}</div>
            ))}
          </div>

          {/* actions */}
          <div className="action-row">
            <button className={`act-btn speaker${speaking?' playing':''}`}
              onClick={handleSpeak} aria-label="Listen">🔊</button>
            <button className={`act-btn mic${recording?' recording':''}`}
              onClick={handleMic} aria-label="Speak">{recording?'⏹️':'🎤'}</button>
            <button className="act-btn nxt" onClick={handleNext} aria-label="Next"
              style={{opacity:answered?1:0.4}}>
              {lessonIdx+1>=total?'🏆':'➡️'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────
//  ROOT APP
// ─────────────────────────────────────
const SCREENS=['start','category','module','scenario','learning'];

function App(){
  const [screen,setScreen]=useState('start');
  const [category,setCategory]=useState(null);
  const [module,setModule]=useState(null);
  const [scenario,setScenario]=useState(null);

  const goTo=useCallback(s=>setScreen(s),[]);

  const screens={
    start:(
      <div className="screen-wrap visible" style={{position:'absolute',inset:0}}>
        <StartScreen onStart={()=>goTo('category')}/>
      </div>
    ),
    category:(
      <CategoryScreen
        onSelect={c=>{setCategory(c);goTo('module')}}
        onBack={()=>goTo('start')}
      />
    ),
    module:(
      <ModuleScreen
        onSelect={m=>{setModule(m);goTo('scenario')}}
        onBack={()=>goTo('category')}
      />
    ),
    scenario:(
      <ScenarioScreen
        onSelect={s=>{setScenario(s);goTo('learning')}}
        onBack={()=>goTo('module')}
      />
    ),
    learning:(
      <LearningScreen
        scenario={scenario}
        onBack={()=>goTo('scenario')}
        onComplete={()=>goTo('scenario')}
      />
    ),
  };

  return(
    <div className="app-shell">
      {screens[screen]}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
